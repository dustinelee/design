<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            background-color: #fff;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #333;
            color: white;
            padding: 20px;
            flex-shrink: 0;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin: 5px 0;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #555;
            padding-left: 20px;
        }

        .main {
            flex-grow: 1;
            padding: 40px;
            animation: fadeIn 1s;
        }

        .main h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: clamp(28px, 5vw, 35px);
            color: #333;
        }

        .skills-container {
            display: flex;
            flex-wrap: wrap; 
            gap: 30px;
            justify-content: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .section {
            flex: 1;
            min-width: 280px; 
        }

        .section h2 {
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #f4f4f4;
            padding-bottom: 10px;
        }

        .skill {
            background: #f4f4f4;
            padding: 15px;
            margin: 12px 0;
            border-left: 5px solid #333;
            border-radius: 4px;
            transition: 0.3s;
            font-weight: bold;
            color: #444;
        }

        .skill:hover {
            transform: translateX(10px);
            background: #e0e0e0;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                padding: 15px;
                text-align: center;
            }

            .sidebar h2 {
                display: none;
            }

            .sidebar a {
                display: inline-block;
                margin: 2px 5px;
            }

            .main {
                padding: 20px;
            }

            .skill:hover {
                transform: none; 
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Portfolio</h2>
        <a href="index.html">Home</a>
        <a href="skills.html">Skills</a>
    </div>

    <div class="main">
        <h1>My Skills</h1>

        <div class="skills-container">

            <div class="section">
                <h2>Technical Skills</h2>
                <div class="skill">HTML 9/10</div>
                <div class="skill">CSS 6/10</div> 
            </div>

            <div class="section">
                <h2>Other Skills</h2>
                <div class="skill">Communication</div>
                <div class="skill">Teamwork</div>
                <div class="skill">Problem Solving</div>
                <div class="skill">Time Management</div>
            </div>

        </div>
    </div>

</body>
</html>
