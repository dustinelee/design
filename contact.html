<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 200px;
            background: #333;
            color: white;
            padding: 20px;
            flex-shrink: 0;
        }

        .sidebar h3 {
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #555;
        }

        .main {
            flex-grow: 1;
            padding: 40px;
            animation: fadeIn 1s;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: clamp(24px, 5vw, 32px);
        }

       
        .form-box {
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: 0 auto;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        button {
            width: 100%;
            background: #333;
            color: white;
            padding: 12px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background: #555;
        }

        /* 5. INFO SECTION */
        .info {
            text-align: center;
            margin-top: 30px;
            color: #555;
            line-height: 1.6;
        }

        /* 6. MOBILE VERSION */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                padding: 10px;
                text-align: center;
            }

            .sidebar h3 {
                display: none;
            }

            .sidebar a {
                display: inline-block;
                margin: 0 5px;
            }

            .main {
                padding: 20px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h3>Portfolio</h3>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
    </div>

    <div class="main">
        <h1>Contact Me</h1>

        <div class="form-box">
            <form action="#">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>

        <div class="info">
            <p><b>Email:</b> dustineleedizon@gmail.com</p>
            <p><b>Phone:</b> 09619367064</p>
            <p><b>Location:</b> Dapdap Tarlac City</p>
        </div>
    </div>

</body>
</html>
